basePath: /
definitions:
  operations.BinaryOperationRequest:
    properties:
      operand_a:
        example: 10.5
        type: number
      operand_b:
        example: 3.2
        type: number
    type: object
  operations.CalculateResponse:
    properties:
      result:
        example: 13.7
        type: number
    type: object
  operations.ErrorResponse:
    properties:
      error:
        example: division by zero
        type: string
    type: object
  operations.UnaryOperationRequest:
    properties:
      operand:
        example: 25
        type: number
    type: object
info:
  contact: {}
  description: REST API for arithmetic and advanced calculator operations.
  title: FS Calculator API
  version: "1.0"
paths:
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - Health
  /v1/operations/add:
    post:
      consumes:
      - application/json
      parameters:
      - description: Operands
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/operations.BinaryOperationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/operations.CalculateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/operations.ErrorResponse'
      summary: Add two numbers
      tags:
      - Operations
