services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    environment:
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    volumes:
      - ./backend:/app
      - backend_go_mod:/go/pkg/mod
      - backend_go_build:/root/.cache/go-build
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    depends_on:
      - backend
    environment:
      VITE_PROXY_TARGET: http://backend:8080
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"

volumes:
  backend_go_mod:
  backend_go_build:
  frontend_node_modules:
